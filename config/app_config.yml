#It stores all the application settings such as (directories, LLM_config, rag_config)

directories:
  stored_csv_xlsx_directory: data/csv_xlsx
  stored_csv_xlsx_sqldb_directory: data/csv_xlsx_sqldb.db
  stored_csv_xlsx_vectordb_directory: data/csv_xlsx_vectordb.db
  for_upload_directory: data/for_upload
  stored_sqldb_directory: data/sqldb.db
  stored_chinook_sqlite_directory: data/Chinook_Sqlite.sqlite
  persist_directory: data/chroma

llm_config:
  agent_llm_system_role: "Given the following user Question, corresponding SQL query, SQL result, and answer the user question\n
                        Question:{question}\n
                        SQL query:{query}\n
                        SQL result:{result}\n
                        Answer: "
  rag_llm_system_role: "You will receive the user's question along with the search results of that question over a database. Give the user the proper answer."
  engine: "gpt-4.o-mini"
  temperature: 0.0

rag_config:
  collection_name: titanic_small
  top_k: 1
